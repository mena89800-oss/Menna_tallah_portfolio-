<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:black;
font-family:Arial;
color:white;
overflow-x:hidden;
padding:40px 20px;
position:relative;
}

.container{
text-align:center;
z-index:2;
padding:20px;
max-width:700px;
width:100%;
margin:auto;
}

h1{
font-size:70px;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

p{
font-size:24px;
opacity:0.8;
margin-bottom:20px;
}

.main-img{
width:250px;
border-radius:20px;
margin:20px 0;
box-shadow:0 0 20px rgba(255,0,80,0.5);
}

.question{
margin-top:40px;
animation:fade 0.5s ease;
}

button{
margin:10px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff0055;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
position:relative;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
pointer-events:none;
}

.effect{
position:absolute;
font-size:25px;
pointer-events:none;
animation:pop 1s forwards;
}

video{
margin-top:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,80,0.5);
max-width:100%;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}

}

@keyframes glow{

from{
text-shadow:0 0 10px pink;
}

to{
text-shadow:0 0 30px red;
}

}

@keyframes pop{

0%{
transform:translateY(0) scale(0);
opacity:1;
}

100%{
transform:translateY(-80px) scale(2);
opacity:0;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p>
You are my favorite person in the world ✨
</p>

<img src="photo.jpg" class="main-img">

<br>

<button onclick="showQuestions()">
Click Me ❤️
</button>

<div id="questions" style="display:none;">

<!-- Question 1 -->
<div class="question" id="q1">

<h2>What's your favorite? 🥺</h2>

<button onclick="correctAnswer('q1','q2',this)">
Rory ❤️
</button>

<button onclick="wrongAnswer(this)">
Golf
</button>

</div>

<!-- Question 2 -->
<div class="question" id="q2" style="display:none;">

<h2>Who is the cutest person ever? ✨</h2>

<button onclick="correctAnswer('q2','q3',this)">
You ❤️
</button>

<button onclick="wrongAnswer(this)">
Someone else
</button>

</div>

<!-- Question 3 -->
<div class="question" id="q3" style="display:none;">

<h2>Will you stay with me forever? 💍</h2>

<button onclick="finalMessage(this)">
Yes Forever ❤️
</button>

<button onclick="wrongAnswer(this)">
Maybe No
</button>

</div>

</div>

<!-- Final Video -->
<div id="final-video" style="display:none; margin-top:40px;">

<h2>Special Surprise For You ❤️</h2>

<video width="300" controls autoplay>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

function createHeart(){

const heart=document.createElement('div');

heart.classList.add('heart');

heart.innerHTML='❤';

heart.style.left=Math.random()*100+'vw';

heart.style.animationDuration=
(Math.random()*3+3)+'s';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

function showQuestions(){

document.getElementById("questions").style.display="block";

window.scrollTo(0, document.body.scrollHeight);

}

function createEffect(element,emoji){

for(let i=0;i<8;i++){

const effect=document.createElement("div");

effect.classList.add("effect");

effect.innerHTML=emoji;

effect.style.left=
(element.getBoundingClientRect().left + Math.random()*80)+"px";

effect.style.top=
(element.getBoundingClientRect().top)+"px";

document.body.appendChild(effect);

setTimeout(()=>{
effect.remove();
},1000);

}

}

function correctAnswer(current,next,button){

createEffect(button,"❤️");

setTimeout(()=>{

document.getElementById(current).style.display="none";

document.getElementById(next).style.display="block";

window.scrollTo(0, document.body.scrollHeight);

},800);

}

function wrongAnswer(button){

createEffect(button,"😡");

button.style.position="absolute";

button.style.left=Math.random()*80+"vw";

button.style.top=Math.random()*80+"vh";

}

function finalMessage(button){

createEffect(button,"❤️");

setTimeout(()=>{

document.getElementById("q3").style.display="none";

document.getElementById("final-video").style.display="block";

window.scrollTo(0, document.body.scrollHeight);

},800);

}

</script>

</body>
</html>
