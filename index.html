<!DOCTYPE html>
<html lang="en">

<title>Happy Birthday ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

.container{
text-align:center;
z-index:2;
}

h1{
font-size:70px;
margin-bottom:20px;
animation: glow 2s infinite alternate;
}

p{
font-size:24px;
opacity:0.8;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}
}

@keyframes glow{
from{
text-shadow:0 0 10px pink;
}

to{
text-shadow:0 0 30px red;
}
}

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff0055;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p>
You are my favorite person in the world ✨
</p>

<button onclick="showMessage()">
Click Me
</button>

</div>

<script>

function createHeart(){

const heart = document.createElement('div');

heart.classList.add('heart');

heart.innerHTML = '❤';

heart.style.left = Math.random() * 100 + 'vw';

heart.style.animationDuration =
Math.random() * 3 + 3 + 's';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

function showMessage(){

alert("I love you forever ❤️");

}

</script>

</body>
</html>
