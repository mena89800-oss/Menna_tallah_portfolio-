```html
<script>

/* Floating Hearts */

function createHeart(){

const heart = document.createElement('div');

heart.classList.add('heart');

heart.innerHTML = '❤';

heart.style.left = Math.random() * 100 + 'vw';

heart.style.animationDuration =
(Math.random() * 3 + 3) + 's';

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 6000);

}

setInterval(createHeart, 300);

/* Particles */

function createParticle(){

const particle = document.createElement("div");

particle.classList.add("particle");

particle.style.left = Math.random() * 100 + "vw";

particle.style.animationDuration =
(Math.random() * 5 + 4) + "s";

particle.style.opacity = Math.random();

document.body.appendChild(particle);

setTimeout(() => {
particle.remove();
}, 9000);

}

setInterval(createParticle, 200);

/* Show Questions */

function showQuestions(){

document.getElementById("questions").style.display = "block";

}

/* Effects */

function createEffect(element, emoji){

for(let i = 0; i < 8; i++){

const effect = document.createElement("div");

effect.classList.add("effect");

effect.innerHTML = emoji;

effect.style.left =
(element.getBoundingClientRect().left + Math.random() * 80) + "px";

effect.style.top =
(element.getBoundingClientRect().top) + "px";

document.body.appendChild(effect);

setTimeout(() => {
effect.remove();
}, 1000);

}

}

/* Correct Answer */

function correctAnswer(current, next, button){

createEffect(button, "❤️");

setTimeout(() => {

document.getElementById(current).style.display = "none";

document.getElementById(next).style.display = "block";

}, 500);

}

/* Wrong Answer */

function wrongAnswer(button){

createEffect(button, "😡");

button.style.position = "absolute";

button.style.left = Math.random() * 70 + "vw";

button.style.top = Math.random() * 70 + "vh";

}

/* Final Message */

function finalMessage(button){

createEffect(button, "❤️");

setTimeout(() => {

document.getElementById("q3").style.display = "none";

document.getElementById("final-video").style.display = "block";

}, 500);

}

</script>
```
